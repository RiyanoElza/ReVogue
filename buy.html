<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Products | ReVogue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">

  <nav class="navbar">
    <a href="index.html" class="brand-logo">Re<span>Vogue</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html" class="active">Products</a></li>
      <li><a href="cart.html">Cart (<span id="nav-cart-count">0</span>)</a></li>
      <li><a href="profile.html">My Profile</a></li>
    </ul>
  </nav>

  <div class="container" style="padding-top: 2rem; flex-grow: 1;">
    
    <div style="margin-bottom: 2rem;">
      <a href="products.html" style="text-decoration: none; color: var(--text-muted);">&larr; Back to Selection</a>
    </div>

    <!-- Browse Products Section (Purchasing) -->
    <div id="buy-section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
        <h2 class="section-title" style="margin-bottom: 0; text-align: left;">Available Products</h2>
        <div>
          <label for="sortProducts" style="margin-right: 0.5rem; font-weight: 500;">Sort By:</label>
          <select id="sortProducts" class="form-control" style="width: auto; display: inline-block;" onchange="renderProducts(false, this.value)">
            <option value="date">Newest First</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </div>
      </div>

      <div class="products-grid" id="all-products">
        <!-- Dynamically injected via JS -->
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-bottom" style="margin-top: 0; padding-top: 2rem;">
      &copy; 2026 ReVogue DBMS Microproject. All Rights Reserved.
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderProducts(false, 'date');
    });
  </script>
</body>
</html>
